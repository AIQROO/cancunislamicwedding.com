<style>
.err-section { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 96px 24px; background: var(--off-white); position: relative; overflow: hidden; }
.err-section::before { content: ''; position: absolute; inset: 0; background-image: url('/assets/pattern.svg'); background-size: 280px; opacity: calc(0.05 * var(--gold-intensity)); pointer-events: none; }
.err-wrap { position: relative; max-width: 640px; }
.err-code { font-family: var(--font-display); font-style: italic; color: var(--gold); font-size: clamp(72px, 14vw, 144px); line-height: 1; margin-bottom: 8px; opacity: var(--gold-intensity); }
.err-section h1 { margin-bottom: 18px; }
.err-section p { font-size: 17px; max-width: 480px; margin: 0 auto 36px; }
.err-section .script { display: block; margin-bottom: 4px; }
.err-actions { display: inline-flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
</style>

<body data-page="404">
<div id="site-header"></div>
<main id="main">

<section class="err-section">
  <div class="err-wrap">
    <span class="script" id="err-script">Bismillah</span>
    <div class="err-code">404</div>
    <h1 id="err-title">This page does not exist.</h1>
    <p id="err-body">The link may have changed or the address may be mistyped. Go back home or message us on WhatsApp.</p>
    <div class="err-actions">
      <a href="/" class="btn btn--primary" id="err-home">Back to home</a>
      <a href="https://wa.me/525549114170" target="_blank" rel="noopener" class="btn btn--secondary" id="err-wa">Message us on WhatsApp</a>
    </div>
  </div>
</section>

</main>
<div id="site-footer"></div>

<script>
// Detect language from referring path or URL hash, then localize the error page
(function () {
  const p = (location.pathname || '').toLowerCase();
  const lang = p.startsWith('/es/') ? 'es' : p.startsWith('/fr/') ? 'fr' : p.startsWith('/ar/') ? 'ar' : 'en';
  const T = {
    en: { title: 'This page does not exist.', body: "The link may have changed or the address was mistyped. Go back home, or message us on WhatsApp.", home: 'Back to home', wa: 'Message us on WhatsApp', script: 'Bismillah' },
    es: { title: 'Esta página no existe.', body: 'Es probable que el enlace haya cambiado o que la dirección esté mal escrita. Vuelve al inicio o hablemos por WhatsApp.', home: 'Volver al inicio', wa: 'Escríbenos por WhatsApp', script: 'Bismillah' },
    fr: { title: "Cette page n'existe pas.", body: "Le lien a peut-être changé ou l'adresse est mal saisie. Retournez à l'accueil ou écrivez-nous sur WhatsApp.", home: "Retour à l'accueil", wa: 'Écrivez-nous sur WhatsApp', script: 'Bismillah' },
    ar: { title: 'هذه الصفحة غير موجودة.', body: 'ربما تغيّر الرابط أو كُتب العنوان بشكل خاطئ. عُد إلى الرئيسية أو راسلنا على واتساب.', home: 'العودة إلى الرئيسية', wa: 'راسلنا على واتساب', script: 'بسم الله' }
  };
  const t = T[lang];
  document.documentElement.lang = lang;
  if (lang === 'ar') document.documentElement.dir = 'rtl';
  document.getElementById('err-title').textContent = t.title;
  document.getElementById('err-body').textContent = t.body;
  document.getElementById('err-home').textContent = t.home;
  document.getElementById('err-wa').textContent = t.wa;
  document.getElementById('err-script').textContent = t.script;
  // Adjust home button to point to current lang root
  document.getElementById('err-home').href = lang === 'en' ? '/' : '/' + lang + '/';
})();
</script>
<script src="/assets/site.js"></script>
</body>
</html>
